name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # .NET — build + unit tests
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: .NET Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      - name: Run unit tests
        run: >
          dotnet test --no-build -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: ./coverage

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend — type-check + build
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build

      - name: Lint
        run: pnpm --filter web lint

  # ──────────────────────────────────────────────────────────────────────────
  # Playwright e2e — runs only when both servers can be started.
  # Disabled by default in CI because it requires a live SQL Server instance.
  # Enable by removing the `if: false` gate and wiring up the database.
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Remove `if: false` and configure a test database to enable e2e in CI
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost:5173
        run: pnpm --filter e2e test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/e2e/playwright-report/
          retention-days: 7
